[package]
name = "hollowreach"
version = "0.1.0"
edition = "2024"
description = "A 3D first-person exploration game built with Bevy"
license = "MIT"

[dependencies]
bevy = { version = "0.15", features = ["jpeg"] }

[[test]]
name = "e2e"
path = "tests/e2e.rs"
harness = false

[[test]]
name = "validate"
path = "tests/validate.rs"
harness = false

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
